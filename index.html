<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCB.AI — Circuit Design Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #0d0f10;
  --bg-panel: #131618;
  --bg-card: #1a1d20;
  --bg-hover: #1f2326;
  --bg-active: #242830;
  --border: #2a2e34;
  --border-bright: #3a3f48;
  --text-primary: #e8eaed;
  --text-secondary: #8a9099;
  --text-muted: #555b63;
  --accent-green: #00e676;
  --accent-green-dim: #00e67622;
  --accent-blue: #4fc3f7;
  --accent-blue-dim: #4fc3f715;
  --accent-amber: #ffb300;
  --accent-amber-dim: #ffb30018;
  --accent-red: #ff5252;
  --accent-red-dim: #ff525218;
  --accent-purple: #ce93d8;
  --grid-color: #1a1d2088;
  --font-mono: 'JetBrains Mono', monospace;
  --font-ui: 'Space Grotesk', sans-serif;
  --radius: 6px;
  --radius-lg: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 14px;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* PCB grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--grid-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}

/* ─── TOPBAR ─── */
.topbar {
  position: relative;
  z-index: 10;
  height: 48px;
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 0;
  flex-shrink: 0;
}
.topbar-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-right: 24px;
}
.logo-icon {
  width: 28px; height: 28px;
  background: var(--accent-green);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-icon svg { width: 16px; height: 16px; }
.logo-text {
  font-family: var(--font-mono);
  font-weight: 600;
  font-size: 15px;
  color: var(--text-primary);
  letter-spacing: -0.5px;
}
.logo-text span { color: var(--accent-green); }

.topbar-tabs {
  display: flex;
  align-items: center;
  gap: 2px;
  flex: 1;
}
.tab-btn {
  padding: 6px 14px;
  border-radius: var(--radius);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.tab-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.tab-btn.active { background: var(--bg-active); color: var(--accent-green); }

.topbar-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-indicator {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--text-muted);
}
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-green);
  box-shadow: 0 0 6px var(--accent-green);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.btn-icon {
  width: 32px; height: 32px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  font-size: 13px;
}
.btn-icon:hover { background: var(--bg-hover); border-color: var(--border-bright); color: var(--text-primary); }

/* ─── MAIN LAYOUT ─── */
.main {
  position: relative;
  z-index: 1;
  flex: 1;
  display: grid;
  grid-template-columns: 220px 1fr 300px;
  overflow: hidden;
  min-height: 0;
}

/* ─── LEFT SIDEBAR ─── */
.sidebar-left {
  background: var(--bg-panel);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-section {
  padding: 12px;
  border-bottom: 1px solid var(--border);
}
.sidebar-section-title {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.search-box {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 7px 10px;
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 12px;
  outline: none;
  transition: border-color 0.15s;
}
.search-box:focus { border-color: var(--accent-green); }
.search-box::placeholder { color: var(--text-muted); }

.component-list { overflow-y: auto; flex: 1; padding: 8px; }
.component-list::-webkit-scrollbar { width: 4px; }
.component-list::-webkit-scrollbar-track { background: transparent; }
.component-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.comp-category { margin-bottom: 12px; }
.comp-category-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  letter-spacing: 0.8px;
  text-transform: uppercase;
  padding: 0 4px;
  margin-bottom: 6px;
}
.comp-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius);
  cursor: pointer;
  border: 1px solid transparent;
  transition: all 0.15s;
  margin-bottom: 2px;
}
.comp-item:hover { background: var(--bg-hover); border-color: var(--border); }
.comp-item.selected { background: var(--accent-green-dim); border-color: var(--accent-green); }
.comp-icon {
  width: 28px; height: 28px;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}
.comp-icon.mcu { background: #1a2744; color: var(--accent-blue); border: 1px solid #2a3d66; }
.comp-icon.sensor { background: #1a2a1a; color: var(--accent-green); border: 1px solid #2a4a2a; }
.comp-icon.power { background: #2a2000; color: var(--accent-amber); border: 1px solid #4a3800; }
.comp-icon.passive { background: #1a1a2a; color: var(--accent-purple); border: 1px solid #2a2a4a; }
.comp-icon.interface { background: #2a1a1a; color: #ff7043; border: 1px solid #4a2a2a; }
.comp-info { flex: 1; min-width: 0; }
.comp-name { font-size: 12px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.comp-desc { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.comp-add-btn {
  width: 20px; height: 20px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  line-height: 1;
  transition: all 0.15s;
  flex-shrink: 0;
}
.comp-add-btn:hover { background: var(--accent-green-dim); border-color: var(--accent-green); color: var(--accent-green); }

/* ─── CENTER: CHAT ─── */
.center-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.netlist-bar {
  background: var(--bg-panel);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
  min-height: 44px;
}
.netlist-label {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-right: 4px;
  flex-shrink: 0;
}
.netlist-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px;
  border-radius: 20px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  border: 1px solid;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.netlist-chip.mcu { color: var(--accent-blue); border-color: #2a3d6688; background: #1a274415; }
.netlist-chip.mcu:hover { background: #1a274440; }
.netlist-chip.sensor { color: var(--accent-green); border-color: #2a4a2a88; background: #1a2a1a15; }
.netlist-chip.power { color: var(--accent-amber); border-color: #4a380088; background: #2a200015; }
.netlist-chip.passive { color: var(--accent-purple); border-color: #2a2a4a88; background: #1a1a2a15; }
.netlist-chip.interface { color: #ff7043; border-color: #4a2a2a88; background: #2a1a1a15; }
.netlist-chip svg { width: 10px; height: 10px; }
.chip-remove { color: inherit; opacity: 0.5; cursor: pointer; font-size: 12px; line-height: 1; padding: 0 1px; }
.chip-remove:hover { opacity: 1; }
.netlist-empty { color: var(--text-muted); font-size: 12px; font-style: italic; }

.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-height: 0;
}
.chat-area::-webkit-scrollbar { width: 4px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.message {
  display: flex;
  gap: 12px;
  animation: msg-in 0.2s ease-out;
}
@keyframes msg-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 32px; height: 32px;
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  font-weight: 600;
  font-family: var(--font-mono);
}
.msg-avatar.ai { background: var(--accent-green-dim); border: 1px solid var(--accent-green); color: var(--accent-green); }
.msg-avatar.user { background: var(--bg-active); border: 1px solid var(--border-bright); color: var(--text-secondary); }
.msg-bubble {
  max-width: 75%;
  padding: 12px 14px;
  border-radius: var(--radius-lg);
  line-height: 1.6;
  font-size: 13.5px;
}
.message.ai .msg-bubble {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-top-left-radius: 3px;
  color: var(--text-primary);
}
.message.user .msg-bubble {
  background: var(--accent-green-dim);
  border: 1px solid var(--accent-green);
  border-top-right-radius: 3px;
  color: var(--text-primary);
}
.msg-bubble code {
  font-family: var(--font-mono);
  font-size: 12px;
  background: var(--bg-base);
  padding: 1px 5px;
  border-radius: 3px;
  color: var(--accent-blue);
}
.msg-bubble pre {
  background: var(--bg-base);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 12px;
  margin: 8px 0;
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: 11.5px;
  line-height: 1.6;
  color: var(--text-secondary);
}
.msg-bubble .net-added {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 7px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--accent-green-dim);
  border: 1px solid var(--accent-green);
  color: var(--accent-green);
  margin: 2px 2px;
}
.msg-bubble .warn-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 7px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--accent-amber-dim);
  border: 1px solid var(--accent-amber);
  color: var(--accent-amber);
  margin: 2px 2px;
}
.msg-bubble .error-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 2px 7px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--accent-red-dim);
  border: 1px solid var(--accent-red);
  color: var(--accent-red);
  margin: 2px 2px;
}
.msg-meta {
  font-size: 10px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  margin-top: 5px;
  padding: 0 2px;
}
.message.user .msg-meta { text-align: right; }

.typing-indicator {
  display: flex; align-items: center; gap: 5px;
  padding: 10px 14px;
}
.typing-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-green);
  animation: typing 1s infinite;
}
.typing-dot:nth-child(2) { animation-delay: 0.15s; }
.typing-dot:nth-child(3) { animation-delay: 0.3s; }
@keyframes typing {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.1); }
}

/* Quick actions */
.quick-actions {
  padding: 8px 16px;
  display: flex; gap: 6px; flex-wrap: wrap;
  border-top: 1px solid var(--border);
  background: var(--bg-panel);
}
.quick-btn {
  padding: 5px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-family: var(--font-ui);
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.quick-btn:hover { border-color: var(--accent-green); color: var(--accent-green); background: var(--accent-green-dim); }

.chat-input-row {
  padding: 12px 16px;
  background: var(--bg-panel);
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.chat-input {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 10px 14px;
  color: var(--text-primary);
  font-family: var(--font-ui);
  font-size: 13.5px;
  outline: none;
  resize: none;
  min-height: 42px;
  max-height: 120px;
  line-height: 1.5;
  transition: border-color 0.15s;
}
.chat-input:focus { border-color: var(--accent-green); }
.chat-input::placeholder { color: var(--text-muted); }
.send-btn {
  width: 42px; height: 42px;
  border-radius: var(--radius);
  border: 1px solid var(--accent-green);
  background: var(--accent-green-dim);
  color: var(--accent-green);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.send-btn:hover { background: var(--accent-green); color: var(--bg-base); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ─── RIGHT SIDEBAR: Validation + Netlist ─── */
.sidebar-right {
  background: var(--bg-panel);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.right-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.right-tab {
  flex: 1;
  padding: 10px 8px;
  border: none;
  background: transparent;
  color: var(--text-muted);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  border-bottom: 2px solid transparent;
  text-align: center;
}
.right-tab:hover { color: var(--text-secondary); }
.right-tab.active { color: var(--accent-green); border-bottom-color: var(--accent-green); }

.right-tab-content { display: none; flex: 1; overflow-y: auto; }
.right-tab-content.active { display: flex; flex-direction: column; }
.right-tab-content::-webkit-scrollbar { width: 4px; }
.right-tab-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Validation panel */
.validate-header {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.validate-score {
  display: flex; align-items: center; gap: 8px;
}
.score-ring {
  position: relative;
  width: 42px; height: 42px;
}
.score-ring svg { transform: rotate(-90deg); }
.score-ring .score-text {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 600;
  color: var(--accent-green);
}
.validate-btn {
  padding: 6px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--accent-green);
  background: var(--accent-green-dim);
  color: var(--accent-green);
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.validate-btn:hover { background: var(--accent-green); color: var(--bg-base); }

.issues-list { padding: 8px; flex: 1; }
.issue-item {
  padding: 10px 10px;
  border-radius: var(--radius);
  border: 1px solid;
  margin-bottom: 6px;
  transition: all 0.15s;
  cursor: pointer;
}
.issue-item:hover { opacity: 0.85; }
.issue-item.error { border-color: var(--accent-red); background: var(--accent-red-dim); }
.issue-item.warning { border-color: var(--accent-amber); background: var(--accent-amber-dim); }
.issue-item.info { border-color: var(--accent-blue); background: var(--accent-blue-dim); }
.issue-item.ok { border-color: #2a4a2a; background: #1a2a1a15; }
.issue-header {
  display: flex; align-items: center; gap: 7px;
  margin-bottom: 4px;
}
.issue-icon { font-size: 12px; flex-shrink: 0; }
.issue-title { font-size: 12px; font-weight: 600; }
.issue-item.error .issue-title { color: var(--accent-red); }
.issue-item.warning .issue-title { color: var(--accent-amber); }
.issue-item.info .issue-title { color: var(--accent-blue); }
.issue-item.ok .issue-title { color: var(--accent-green); }
.issue-body { font-size: 11.5px; color: var(--text-secondary); line-height: 1.5; }
.issue-fix {
  margin-top: 6px;
  padding: 4px 8px;
  background: var(--bg-base);
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--text-muted);
}
.no-issues {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  flex: 1; gap: 10px; color: var(--text-muted); padding: 40px 20px; text-align: center;
}
.no-issues .ni-icon { font-size: 32px; opacity: 0.4; }
.no-issues p { font-size: 12px; line-height: 1.6; }

/* Netlist details panel */
.netlist-detail { padding: 8px; flex: 1; }
.nl-comp-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
}
.nl-comp-header {
  padding: 8px 10px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.nl-comp-header:hover { background: var(--bg-hover); }
.nl-badge {
  padding: 2px 6px;
  border-radius: 3px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 600;
}
.nl-badge.mcu { background: #1a2744; color: var(--accent-blue); }
.nl-badge.sensor { background: #1a2a1a; color: var(--accent-green); }
.nl-badge.power { background: #2a2000; color: var(--accent-amber); }
.nl-badge.passive { background: #1a1a2a; color: var(--accent-purple); }
.nl-badge.interface { background: #2a1a1a; color: #ff7043; }
.nl-comp-name { font-size: 12px; font-weight: 600; color: var(--text-primary); flex: 1; }
.nl-comp-id { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); }
.nl-pins { padding: 6px 10px 8px; }
.nl-pin-row {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 0;
  font-size: 11px;
  border-bottom: 1px solid var(--border);
}
.nl-pin-row:last-child { border-bottom: none; }
.nl-pin-name { font-family: var(--font-mono); color: var(--text-muted); width: 70px; flex-shrink: 0; }
.nl-pin-net { font-family: var(--font-mono); color: var(--accent-green); font-size: 10.5px; }
.nl-pin-unconnected { color: var(--accent-red); font-size: 10.5px; font-style: italic; }
.nl-remove-btn {
  width: 20px; height: 20px;
  border-radius: 3px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;

.sim-val.invalid { color: var(--accent-red); }

// ═══════════════════════════════════════════════════════
//  CIRCUIT STATE
// ═══════════════════════════════════════════════════════
let circuitState = {
  components: [],   // { instanceId, compId, label, pins: [...], type }
  nets: [],         // { name, pins: ['instanceId.pinName', ...] }
  nextId: 1
};

// ═══════════════════════════════════════════════════════
//  RULES ENGINE (deterministic, no AI)
// ═══════════════════════════════════════════════════════
const RULES = {
  checkAllGrounded(state) {
    const issues = [];
    for (const comp of state.components) {
      const gndPin = comp.pins.find(p => p.name === 'GND' || p.name === 'GND1' || p.name === 'GND2');
      if (gndPin && !gndPin.net) {
        issues.push({
          type: 'error', title: `${comp.label} — Missing GND`,
          body: `${comp.label} (${comp.compId}) has no ground connection. Every component must have GND connected.`,
          fix: `Connect ${comp.label}.GND to the GND net`
        });
      }
    }
    return issues;
  },

  checkPowerSupply(state) {
    const issues = [];
    const esp32 = state.components.find(c => c.compId.includes('ESP32'));
    if (esp32) {
      const vcc = esp32.pins.find(p => p.name === 'VCC');
      if (vcc && !vcc.net) {
        issues.push({
          type: 'error', title: `${esp32.label} — No power`,
          body: `${esp32.label} VCC pin is unconnected. ESP32 requires 3.3V supply.`,
          fix: `Connect ${esp32.label}.VCC → 3V3 net (e.g. from AMS1117-3.3V output)`
        });
      }
    }
    return issues;
  },

  checkVoltageMismatch(state) {
    const issues = [];
    const nano = state.components.find(c => c.compId.includes('Nano'));
    const esp32 = state.components.find(c => c.compId.includes('ESP32'));
    if (nano && esp32) {
      const nanoI2C = nano.pins.find(p => p.name === 'A4/SDA');
      const espI2C = esp32.pins.find(p => p.name === 'GPIO21');
      if (nanoI2C && espI2C && nanoI2C.net && espI2C.net && nanoI2C.net === espI2C.net) {
        issues.push({
          type: 'error', title: 'Voltage mismatch — I2C bus',
          body: 'Arduino Nano I2C runs at 5V logic. ESP32 is 3.3V only. Connecting directly will damage the ESP32.',
          fix: 'Add a bidirectional level shifter (e.g. BSS138) on SDA/SCL between the two devices'
        });
      }
    }
    return issues;
  },

  checkDecoupling(state) {
    const issues = [];
    const mcus = state.components.filter(c => c.type === 'mcu');
    const caps = state.components.filter(c => c.compId === 'C100nF');
    if (mcus.length > 0 && caps.length === 0) {
      issues.push({
        type: 'warning', title: 'Missing decoupling capacitors',
        body: `Found ${mcus.length} MCU(s) but no 100nF bypass capacitors. Decoupling caps are required near each power pin.`,
        fix: 'Add 100nF ceramic caps between VCC and GND on each MCU power pin'
      });
    } else if (mcus.length > 0 && caps.length < mcus.length) {
      issues.push({
        type: 'warning', title: 'Insufficient decoupling',
        body: `${mcus.length} MCU(s) but only ${caps.length} decoupling cap(s). Add at least 1 cap per MCU.`,
        fix: `Add ${mcus.length - caps.length} more 100nF capacitors`
      });
    }
    return issues;
  },

  checkPullupResistors(state) {
    const issues = [];
    const onewire = state.components.find(c => c.compId === 'DS18B20');
    const resistors = state.components.filter(c => c.compId === 'R10K');
    if (onewire) {
      const dqPin = onewire.pins.find(p => p.name === 'DQ');
      const hasLinkedResistor = resistors.some(r => {
        const rA = r.pins.find(p => p.name === 'A');
        const rB = r.pins.find(p => p.name === 'B');
        return (rA && rA.net === dqPin?.net) || (rB && rB.net === dqPin?.net);
      });
      if (onewire && resistors.length === 0) {
        issues.push({
          type: 'warning', title: 'DS18B20 needs pull-up resistor',
          body: 'DS18B20 DQ line requires a 4.7kΩ pull-up resistor to VCC for 1-Wire protocol.',
          fix: 'Add 4.7kΩ resistor between DQ line and VCC (closest 10kΩ from library will work)'
        });
      }
    }
    return issues;
  },

  checkPowerSource(state) {
    const issues = [];
    const hasUSB = state.components.find(c => c.compId === 'USB-C-Conn');
    const hasLDO = state.components.find(c => c.compId === 'AMS1117-3V3');
    const hasMCU = state.components.find(c => c.type === 'mcu');
    if (hasMCU && !hasUSB && !hasLDO) {
      issues.push({
        type: 'warning', title: 'No power source defined',
        body: 'MCU detected but no power supply or input connector found in circuit.',
        fix: 'Add USB-C connector + AMS1117-3.3V LDO for a standard 5V→3.3V power path'
      });
    }
    if (hasUSB && !hasLDO) {
      issues.push({
        type: 'info', title: 'Consider adding voltage regulator',
        body: 'USB-C (5V) detected. ESP32/Arduino need regulated 3.3V or 5V — add AMS1117-3.3V.',
        fix: 'Add AMS1117-3.3V: VIN→VBUS, VOUT→3V3 net, GND→GND net'
      });
    }
    return issues;
  },

  checkUnconnectedPins(state) {
    const issues = [];
    for (const comp of state.components) {
      const powerPins = comp.pins.filter(p => p.type === 'power' && !p.net);
      if (powerPins.length > 0) {
        const names = powerPins.map(p => p.name).join(', ');
        issues.push({
          type: 'warning', title: `${comp.label} — Floating power pins`,
          body: `Power pins with no net: ${names}`,
          fix: `Connect these pins to the appropriate power nets`
        });
      }
    }
    return issues;
  },

  run(state) {
    if (state.components.length === 0) {
      return [{ type: 'info', title: 'Empty schematic', body: 'Add components to start validation.', fix: null }];
    }
    return [
      ...this.checkAllGrounded(state),
      ...this.checkPowerSupply(state),
      ...this.checkVoltageMismatch(state),
      ...this.checkDecoupling(state),
      ...this.checkPullupResistors(state),
      ...this.checkPowerSource(state),
      ...this.checkUnconnectedPins(state),
    ];
  }
};

async function callAI(userMessage, context) {
  const systemPrompt = `You are PCB.AI, an expert PCB design assistant embedded in a schematic editor. You help users design electronics circuits correctly.

CURRENT CIRCUIT STATE:
${JSON.stringify(context, null, 2)}

AVAILABLE COMPONENTS (from library): ${COMPONENT_DB.map(c => c.id).join(', ')}

YOUR ROLE:
- Give specific, actionable circuit design guidance
- When user says "add X", respond with JSON command AND explain the connection
- When user asks about wiring, give exact pin connections
- Detect potential issues (voltage mismatch, missing grounds, etc.)
- Reference real component specs (voltages, protocols, pin names)

COMMAND FORMAT (embed in response for state changes):
When you need to add a component, include this JSON in your response:
\`\`\`json
{"action":"add_component","compId":"EXACT-ID-FROM-LIBRARY","nets":{"PIN_NAME":"NET_NAME"}}
\`\`\`

COMPONENT IDs (exact): ESP32-WROOM-32E, Arduino-Nano, DS18B20, MPU6050, AMS1117-3V3, USB-C-Conn, C100nF, R10K, LED-Red

NET NAMING CONVENTIONS: 3V3, 5V, GND, VBUS, SDA, SCL, TX, RX, ONE_WIRE, INT, MOSI, MISO, SCK

RULES YOU KNOW:
- ESP32 is 3.3V only — never connect to 5V logic directly
- Arduino Nano I2C is 5V — needs level shifter if interfacing with ESP32
- DS18B20 DQ needs 4.7kΩ pull-up to VCC
- Every IC needs decoupling caps (100nF) on power pins
- USB-C VBUS = 5V, needs LDO to get 3.3V

FORMAT your response in clear sections. Be concise. Use code formatting for pin names like \`GPIO22\`. 
If adding a component, always explain what nets to use and WHY.
Keep responses under 250 words unless complexity requires more.`;

  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: "user", content: userMessage }]
    })
  });

  if (!response.ok) throw new Error(`API error: ${response.status}`);
  const data = await response.json();
  return data.content[0].text;

// ═══════════════════════════════════════════════════════
//  PARSE AI COMMANDS
// ═══════════════════════════════════════════════════════
function parseAndExecuteCommands(aiText) {
  const jsonBlocks = aiText.match(/```json\n?([\s\S]*?)```/g);
  if (!jsonBlocks) return;

  for (const block of jsonBlocks) {
    try {
      const json = block.replace(/```json\n?/, '').replace(/```/, '').trim();
      const cmd = JSON.parse(json);
      if (cmd.action === 'add_component') {
        addComponentToCircuit(cmd.compId, cmd.nets || {});
      }
    } catch(e) { /* ignore parse errors */ }
  }
}

// ═══════════════════════════════════════════════════════
//  CIRCUIT STATE MANAGEMENT
// ═══════════════════════════════════════════════════════
function addComponentToCircuit(compId, nets = {}) {
  const template = COMPONENT_DB.find(c => c.id === compId);
  if (!template) return false;

  // Check for duplicate
  const existing = circuitState.components.filter(c => c.compId === compId);
  const instanceNum = existing.length + 1;
  const typePrefix = { mcu: 'U', sensor: 'S', power: 'P', passive: 'C', interface: 'J' };
  const label = (typePrefix[template.type] || 'X') + circuitState.nextId;
  circuitState.nextId++;

  const pins = template.pins.map(p => ({
    ...p,
    net: nets[p.name] || null
  }));

  const instance = {
    instanceId: label,
    compId,
    label,
    type: template.type,
    name: template.name,
    pins
  };

  circuitState.components.push(instance);

  // Create/update nets
  for (const [pinName, netName] of Object.entries(nets)) {
    if (!netName) continue;
    let net = circuitState.nets.find(n => n.name === netName);
    if (!net) {
      net = { name: netName, pins: [] };
      circuitState.nets.push(net);
    }
    net.pins.push(`${label}.${pinName}`);
  }

  renderNetlistBar();
  renderNetlistDetail();
  return label;
}

function removeComponent(instanceId) {
  circuitState.components = circuitState.components.filter(c => c.instanceId !== instanceId);
  circuitState.nets = circuitState.nets.map(n => ({
    ...n,
    pins: n.pins.filter(p => !p.startsWith(instanceId + '.'))
  })).filter(n => n.pins.length > 0);
  renderNetlistBar();
  renderNetlistDetail();
  renderIssuesList([]);
  updateScore(0, 'Not checked', 'run validation');
}

//  RENDERING
// ═══════════════════════════════════════════════════════
function renderNetlistBar() {
  const bar = document.getElementById('netlist-bar');
  const emptyMsg = document.getElementById('netlist-empty-msg');
  const chips = circuitState.components.map(c => {
    const db = COMPONENT_DB.find(d => d.id === c.compId);
    const connectedCount = c.pins.filter(p => p.net).length;
    return `<span class="netlist-chip ${c.type}" title="${c.name} — ${c.compId}" onclick="showProperties('${c.instanceId}')">
      ${c.label}: ${db ? db.name.split('-')[0].trim() : c.compId.split('-')[0]}
      <span class="chip-remove" onclick="event.stopPropagation();removeComponent('${c.instanceId}')" title="Remove">×</span>
    </span>`;
  }).join('');

  if (circuitState.components.length === 0) {
    emptyMsg.style.display = '';
    // Remove old chips
    bar.querySelectorAll('.netlist-chip').forEach(el => el.remove());
  } else {
    emptyMsg.style.display = 'none';
    bar.querySelectorAll('.netlist-chip').forEach(el => el.remove());
    bar.insertAdjacentHTML('beforeend', chips);
  }
}

function renderNetlistDetail() {
  const detail = document.getElementById('netlist-detail');
  if (circuitState.components.length === 0) {
    detail.innerHTML = `<div class="empty-netlist"><div class="ei-icon">⚡</div><p>Add components to see netlist details here.</p></div>`;
    return;
  }
  detail.innerHTML = circuitState.components.map(comp => {
    const db = COMPONENT_DB.find(d => d.id === comp.compId);
    const pinsHtml = comp.pins.map(pin => `
      <div class="nl-pin-row">
        <span class="nl-pin-name">${pin.name}</span>
        ${pin.net
          ? `<span class="nl-pin-net">${pin.net}</span>`
          : `<span class="nl-pin-unconnected">unconnected</span>`
        }
      </div>`).join('');
    return `
    <div class="nl-comp-card">
      <div class="nl-comp-header" onclick="showProperties('${comp.instanceId}')">
        <span class="nl-badge ${comp.type}">${comp.type.toUpperCase()}</span>
        <span class="nl-comp-name">${comp.name || comp.compId}</span>
        <span class="nl-comp-id">${comp.instanceId}</span>
        <button class="nl-remove-btn" onclick="event.stopPropagation();removeComponent('${comp.instanceId}')" title="Remove">×</button>
      </div>
      <div class="nl-pins">${pinsHtml}</div>

  }).join('');
}

function renderIssuesList(issues) {
  const list = document.getElementById('issues-list');
  if (issues.length === 0) {
    list.innerHTML = `<div class="no-issues"><div class="ni-icon">✅</div><p>No issues found. Your circuit looks clean!</p></div>`;
    return;
  }
  list.innerHTML = issues.map(issue => `
    <div class="issue-item ${issue.type}" onclick="askAboutIssue(${JSON.stringify(issue.title).replace(/'/g,"\\'")} )">
      <div class="issue-header">
        <span class="issue-icon">${issue.type === 'error' ? '✗' : issue.type === 'warning' ? '⚠' : 'ℹ'}</span>
        <span class="issue-title">${issue.title}</span>
      </div>
      <div class="issue-body">${issue.body}</div>
      ${issue.fix ? `<div class="issue-fix">Fix: ${issue.fix}</div>` : ''}
    </div>`).join('');
}

function updateScore(pct, label, sub) {
  const arc = document.getElementById('score-arc');
  const txt = document.getElementById('score-text');
  const lbl = document.getElementById('score-label');
  const sub2 = document.getElementById('score-sub');
  const circumference = 100.5;
  const offset = circumference - (pct / 100) * circumference;
  arc.style.strokeDashoffset = offset;
  arc.style.stroke = pct >= 80 ? 'var(--accent-green)' : pct >= 50 ? 'var(--accent-amber)' : 'var(--accent-red)';
  txt.style.color = pct >= 80 ? 'var(--accent-green)' : pct >= 50 ? 'var(--accent-amber)' : 'var(--accent-red)';
  txt.textContent = pct > 0 ? pct + '%' : '—';
  lbl.textContent = label;
  sub2.textContent = sub;
}

// ═══════════════════════════════════════════════════════
//  CHAT SYSTEM
// ═══════════════════════════════════════════════════════
function appendMessage(role, text, isTyping = false) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

  if (isTyping) {
    div.id = 'typing-msg';
    div.innerHTML = `
      <div class="msg-avatar ai">AI</div>
      <div class="msg-bubble">
        <div class="typing-indicator">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>
      </div>`;
  } else {
    div.innerHTML = `
      <div class="msg-avatar ${role}">${role === 'ai' ? 'AI' : 'YOU'}</div>
      <div>
        <div class="msg-bubble">${formatMessage(text)}</div>
        <div class="msg-meta">${time}</div>
      </div>`;
  }
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
  return div;
}

function removeTyping() {
  const t = document.getElementById('typing-msg');
  if (t) t.remove();
}

function formatMessage(text) {
  // Convert markdown-ish to HTML
  text = text.replace(/```json[\s\S]*?```/g, ''); // Remove JSON blocks from display
  text = text.replace(/```([\s\S]*?)```/g, '<pre>$1</pre>');
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\n\n/g, '</p><p>');
  text = text.replace(/\n/g, '<br>');
  return `<p>${text}</p>`;
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const btn = document.getElementById('send-btn');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  appendMessage('user', text);

  // Check for simple "add X" before calling AI
  const addMatch = text.toLowerCase().match(/^add\s+(an?\s+)?(\S+)/);

  const typingDiv = appendMessage('ai', '', true);
  document.getElementById('ai-status').textContent = 'Thinking…';

  try {
    const aiText = await callAI(text, {
      components: circuitState.components.map(c => ({
        id: c.instanceId, name: c.name, type: c.type,
        pins: c.pins.map(p => ({ name: p.name, net: p.net }))
      })),
      nets: circuitState.nets
    });

    removeTyping();
    parseAndExecuteCommands(aiText);
    appendMessage('ai', aiText);
    document.getElementById('ai-status').textContent = 'AI Ready';
  } catch (err) {
    removeTyping();
    appendMessage('ai', `⚠ API error: ${err.message}. Check your Anthropic API key.`);
    document.getElementById('ai-status').textContent = 'Error';
  }

  btn.disabled = false;
  input.focus();
}

function sendQuick(text) {
  document.getElementById('chat-input').value = text;
  sendMessage();
}

function askAboutIssue(title) {
  sendQuick(`Help me fix this issue: "${title}"`);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ═══════════════════════════════════════════════════════
//  VALIDATION
// ═══════════════════════════════════════════════════════
function runValidation() {
  const issues = RULES.run(circuitState);
  renderIssuesList(issues);

  const errors = issues.filter(i => i.type === 'error').length;
  const warnings = issues.filter(i => i.type === 'warning').length;

  if (circuitState.components.length === 0) {
    updateScore(0, 'No components', 'add parts first');
    return;
  }

  const penalty = (errors * 25) + (warnings * 10);
  const score = Math.max(0, 100 - penalty);
  const label = score === 100 ? 'Clean design' : score >= 70 ? 'Minor issues' : score >= 40 ? 'Needs work' : 'Critical errors';
  const sub = `${errors} error${errors !== 1 ? 's' : ''}, ${warnings} warning${warnings !== 1 ? 's' : ''}`;

  updateScore(score, label, sub);

  // Switch to validation tab
  document.querySelectorAll('.right-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.right-tab-content').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-validation').classList.add('active');
  document.querySelectorAll('.right-tab')[0].classList.add('active');
}

// ═══════════════════════════════════════════════════════
//  COMPONENT LIBRARY RENDERING
// ═══════════════════════════════════════════════════════
function renderComponentLibrary(filter = '') {
  const list = document.getElementById('comp-list');
  const categories = {
    mcu: { label: 'Microcontrollers', items: [] },
    sensor: { label: 'Sensors', items: [] },
    power: { label: 'Power', items: [] },
    interface: { label: 'Interfaces', items: [] },
    passive: { label: 'Passives', items: [] },
  };

  for (const comp of COMPONENT_DB) {
    if (!filter || comp.name.toLowerCase().includes(filter.toLowerCase()) || comp.desc.toLowerCase().includes(filter.toLowerCase())) {
      if (categories[comp.type]) categories[comp.type].items.push(comp);
    }
  }

  list.innerHTML = Object.entries(categories).map(([type, cat]) => {
    if (cat.items.length === 0) return '';
    return `<div class="comp-category">
      <div class="comp-category-label">${cat.label}</div>
      ${cat.items.map(comp => `
        <div class="comp-item" id="ci-${comp.id}" onclick="selectComp('${comp.id}')">
          <div class="comp-icon ${type}">${comp.icon}</div>
          <div class="comp-info">
            <div class="comp-name">${comp.name}</div>
            <div class="comp-desc">${comp.desc}</div>
          </div>
          <button class="comp-add-btn" onclick="event.stopPropagation();quickAdd('${comp.id}')" title="Add to circuit">+</button>
        </div>`).join('')}
    </div>`;
  }).join('');
}

function filterComponents(val) {
  renderComponentLibrary(val);
}

function selectComp(id) {
  document.querySelectorAll('.comp-item').forEach(el => el.classList.remove('selected'));
  const el = document.getElementById('ci-' + id);
  if (el) el.classList.add('selected');
}

function quickAdd(compId) {
  sendQuick(`Add ${compId} to my circuit with standard connections`);
}
